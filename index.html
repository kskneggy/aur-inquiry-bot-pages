<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>アウル投げ込みBot — 進捗ダッシュボード</title>
  <style id="auth-hide">body > *:not(#auth-gate) { display: none !important; }</style>
  <script>
  const HASH = '89f92a7f70573102c7452efb3ced75829e82b518fdd621e66f1637b1521d8de2';
  const KEY  = 'aur_pages_auth';
  async function sha256(str) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
  }
  function unlock() {
    document.getElementById('auth-gate').remove();
    document.getElementById('auth-hide').remove();
  }
  window.onAuthSubmit = async function(e) {
    e.preventDefault();
    const pwd = document.getElementById('auth-pwd').value;
    const err = document.getElementById('auth-err');
    if (await sha256(pwd) === HASH) {
      sessionStorage.setItem(KEY, '1');
      unlock();
    } else {
      err.textContent = 'パスワードが違います';
      document.getElementById('auth-pwd').value = '';
      document.getElementById('auth-pwd').focus();
    }
  };
  if (sessionStorage.getItem(KEY) === '1') {
    document.addEventListener('DOMContentLoaded', unlock);
  }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { background: #0f1117; color: #e2e8f0; font-family: 'Helvetica Neue', Arial, sans-serif; }
    .card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 12px; }
    .badge-ok    { background: #1a3a2a; color: #4ade80; border: 1px solid #166534; }
    .badge-warn  { background: #3a2e1a; color: #fbbf24; border: 1px solid #92400e; }
    .badge-error { background: #3a1a1a; color: #f87171; border: 1px solid #991b1b; }
    .metric-val { font-size: 2.2rem; font-weight: 700; line-height: 1; }
    .metric-lbl { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
    .progress-bar { height: 18px; border-radius: 9px; background: #2d3748; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 9px; transition: width 0.8s ease;
                     background: linear-gradient(90deg, #3b82f6, #06b6d4); }
    .progress-fill.danger { background: linear-gradient(90deg, #ef4444, #f97316); }
    table { border-collapse: collapse; width: 100%; }
    th { background: #1e2535; color: #94a3b8; font-size: 0.7rem; text-transform: uppercase;
         letter-spacing: 0.05em; padding: 10px 14px; text-align: left; }
    td { padding: 12px 14px; border-top: 1px solid #2d3748; font-size: 0.875rem; vertical-align: top; }
    tr:hover td { background: #1e2535; }
    .chip { display: inline-block; padding: 2px 8px; border-radius: 9999px; font-size: 0.7rem; margin: 2px 2px 2px 0; }
    .chip-issue  { background: #3a1a1a; color: #fca5a5; }
    .chip-measure { background: #1a2a3a; color: #93c5fd; }
  </style>
</head>
<body class="min-h-screen">

<!-- パスワードゲート -->
<div id="auth-gate" style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0f1117;">
  <div style="background:#1a1f2e;border:1px solid #2d3748;border-radius:12px;padding:40px 48px;text-align:center;width:320px;">
    <div style="font-size:1.5rem;font-weight:700;color:#e2e8f0;margin-bottom:8px;">アウル投げ込みBot</div>
    <div style="font-size:0.8rem;color:#64748b;margin-bottom:28px;">進捗ダッシュボード</div>
    <form onsubmit="onAuthSubmit(event)">
      <input id="auth-pwd" type="password" placeholder="パスワード" autofocus
        style="width:100%;padding:10px 14px;border-radius:8px;border:1px solid #2d3748;background:#0f1117;color:#e2e8f0;font-size:0.95rem;box-sizing:border-box;outline:none;margin-bottom:12px;">
      <button type="submit"
        style="width:100%;padding:10px;border-radius:8px;background:#3b82f6;color:#fff;font-size:0.95rem;font-weight:600;border:none;cursor:pointer;">
        ログイン
      </button>
      <div id="auth-err" style="color:#f87171;font-size:0.8rem;margin-top:10px;min-height:1.2em;"></div>
    </form>
  </div>
</div>

<div class="max-w-7xl mx-auto px-4 py-8">

  <!-- ヘッダー -->
  <div class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-2xl font-bold text-white">アウル投げ込みBot</h1>
      <p class="text-slate-400 text-sm mt-1">進捗・プロセス課題ダッシュボード</p>
    </div>
    <div class="text-right">
      <div id="updated-at" class="text-slate-500 text-xs">読み込み中…</div>
      <a href="https://github.com/kskneggy/aur-inquiry-bot/issues/46"
         target="_blank"
         class="text-blue-400 text-xs hover:underline">Issue #46 全体管理 →</a>
    </div>
  </div>

  <!-- 目標達成状況 -->
  <div class="card p-6 mb-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold">🎯 6月目標 達成状況</h2>
      <span id="goal-badge" class="badge-warn chip text-sm px-3 py-1">読み込み中</span>
    </div>

    <div class="progress-bar mb-2">
      <div id="progress-fill" class="progress-fill" style="width:0%"></div>
    </div>
    <div class="flex justify-between text-xs text-slate-400 mb-6">
      <span>0件</span>
      <span id="progress-label">−</span>
      <span id="goal-label">目標 −件</span>
    </div>

    <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
      <div class="text-center">
        <div id="m-sent" class="metric-val text-blue-400">−</div>
        <div class="metric-lbl">累計送信(請求対象)</div>
      </div>
      <div class="text-center">
        <div id="m-remaining" class="metric-val text-orange-400">−</div>
        <div class="metric-lbl">残り必要件数</div>
      </div>
      <div class="text-center">
        <div id="m-weekdays" class="metric-val text-slate-300">−</div>
        <div class="metric-lbl">残り平日数</div>
      </div>
      <div class="text-center">
        <div id="m-pace-needed" class="metric-val text-red-400">−</div>
        <div class="metric-lbl">必要ペース/日</div>
      </div>
      <div class="text-center">
        <div id="m-pace-actual" class="metric-val text-green-400">−</div>
        <div class="metric-lbl">直近7日 実ペース/日</div>
      </div>
    </div>
  </div>

  <!-- グラフ行 -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
    <!-- 日次送信推移 -->
    <div class="card p-5">
      <h2 class="text-base font-semibold mb-4">📈 日次送信数の推移</h2>
      <canvas id="chart-daily" height="200"></canvas>
    </div>
    <!-- 失敗内訳 -->
    <div class="card p-5">
      <h2 class="text-base font-semibold mb-4">🚦 送信失敗の内訳</h2>
      <canvas id="chart-fail" height="200"></canvas>
    </div>
  </div>

  <!-- 在庫状況 -->
  <div class="card p-5 mb-6">
    <h2 class="text-base font-semibold mb-4">📦 候補シート 在庫状況</h2>
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div class="bg-[#1e2535] rounded-lg p-3 text-center">
        <div id="s-candidate" class="text-2xl font-bold text-cyan-400">−</div>
        <div class="text-xs text-slate-400 mt-1">送信待ち候補</div>
      </div>
      <div class="bg-[#1e2535] rounded-lg p-3 text-center">
        <div id="s-sent" class="text-2xl font-bold text-green-400">−</div>
        <div class="text-xs text-slate-400 mt-1">送信済</div>
      </div>
      <div class="bg-[#1e2535] rounded-lg p-3 text-center">
        <div id="s-failed" class="text-2xl font-bold text-red-400">−</div>
        <div class="text-xs text-slate-400 mt-1">失敗(要手動)</div>
      </div>
      <div class="bg-[#1e2535] rounded-lg p-3 text-center">
        <div id="s-dedup" class="text-2xl font-bold text-slate-400">−</div>
        <div class="text-xs text-slate-400 mt-1">重複除外</div>
      </div>
    </div>
  </div>

  <!-- プロセス別 課題・対策表 -->
  <div class="card p-5">
    <h2 class="text-base font-semibold mb-4">⚙️ プロセス別 課題・対策</h2>
    <div class="overflow-x-auto">
      <table id="process-table">
        <thead>
          <tr>
            <th style="width:14%">ステップ</th>
            <th style="width:9%">状態</th>
            <th style="width:38%">課題</th>
            <th style="width:31%">対策・実装</th>
            <th style="width:8%">効果</th>
          </tr>
        </thead>
        <tbody id="process-tbody">
          <tr><td colspan="5" class="text-slate-500 text-center py-8">読み込み中…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
const DATA_URL = './data.json';

function fmt(n) {
  if (n == null) return '−';
  return Number(n).toLocaleString('ja-JP');
}

function badgeClass(code) {
  return code === 'ok' ? 'badge-ok' : code === 'error' ? 'badge-error' : 'badge-warn';
}

async function loadData() {
  const res = await fetch(DATA_URL + '?t=' + Date.now());
  return res.json();
}

function renderGoal(d) {
  const pct = Math.min(100, (d.total_sent / d.goal) * 100);
  const fill = document.getElementById('progress-fill');
  fill.style.width = pct + '%';
  if (pct < 60) fill.classList.add('danger');

  document.getElementById('progress-label').textContent = fmt(d.total_sent) + '件 (' + pct.toFixed(1) + '%)';
  document.getElementById('goal-label').textContent = '目標 ' + fmt(d.goal) + '件';

  document.getElementById('m-sent').textContent = fmt(d.total_sent);
  document.getElementById('m-remaining').textContent = fmt(d.remaining);
  document.getElementById('m-weekdays').textContent = d.weekdays_left + '日';
  document.getElementById('m-pace-needed').textContent = fmt(d.pace_needed);
  document.getElementById('m-pace-actual').textContent = fmt(d.pace_actual);

  const badge = document.getElementById('goal-badge');
  const onTrack = d.pace_actual >= d.pace_needed;
  badge.textContent = onTrack ? '✅ 達成ペース' : '⚠️ 未達見込み';
  badge.className = 'chip text-sm px-3 py-1 ' + (onTrack ? 'badge-ok' : 'badge-warn');

  document.getElementById('s-candidate').textContent = fmt(d.stock_candidate);
  document.getElementById('s-sent').textContent = fmt(d.stock_sent);
  document.getElementById('s-failed').textContent = fmt(d.stock_failed);
  document.getElementById('s-dedup').textContent = fmt(d.stock_dedup);

  document.getElementById('updated-at').textContent = '更新: ' + (d.updated_at || '−');
}

function renderDailyChart(d) {
  // 直近30日のみ表示
  const daily = (d.daily || []).slice(-30);
  const labels = daily.map(e => e.date.slice(5)); // MM-DD
  const sent = daily.map(e => e.sent || 0);
  const candidate = daily.map(e => e.candidate || 0);

  const ctx = document.getElementById('chart-daily').getContext('2d');
  new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: '送信数',
          data: sent,
          backgroundColor: '#3b82f6cc',
          yAxisID: 'y',
        },
        {
          label: '候補化数',
          data: candidate,
          backgroundColor: '#06b6d466',
          yAxisID: 'y',
        },
      ],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#94a3b8', font: { size: 11 } } },
        tooltip: { mode: 'index' },
      },
      scales: {
        x: { ticks: { color: '#64748b', font: { size: 10 } }, grid: { color: '#1e2535' } },
        y: { ticks: { color: '#94a3b8', font: { size: 10 } }, grid: { color: '#1e2535' } },
      },
    },
  });
}

function renderFailChart(d) {
  const labels = [
    '対象欄なし\n(安全再送可)',
    '実行時エラー\n(安全再送可)',
    'POST済\n(再送危険)',
    '認証メール要\n(再送危険)',
  ];
  const values = [
    d.fail_no_matching || 0,
    d.fail_error || 0,
    d.fail_post_done || 0,
    d.fail_auth_required || 0,
  ];
  const colors = ['#22c55e', '#3b82f6', '#ef4444', '#f97316'];

  const ctx = document.getElementById('chart-fail').getContext('2d');
  new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{ data: values, backgroundColor: colors, borderWidth: 0 }],
    },
    options: {
      responsive: true,
      plugins: {
        legend: {
          position: 'right',
          labels: { color: '#94a3b8', font: { size: 10 }, padding: 12 },
        },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + ctx.label.replace('\n', ' ') + ': ' + fmt(ctx.raw) + '件',
          },
        },
      },
    },
  });
}

function renderProcessTable(steps) {
  const tbody = document.getElementById('process-tbody');
  tbody.innerHTML = '';
  steps.forEach(s => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="font-medium text-white">${s.step}</td>
      <td><span class="chip text-xs px-2 py-1 ${badgeClass(s.status_code)}">${s.status}</span></td>
      <td>${s.issues.map(i => `<span class="chip chip-issue">⚠ ${i}</span>`).join('')}</td>
      <td>${s.measures.map(m => `<span class="chip chip-measure">✓ ${m}</span>`).join('')}</td>
      <td class="text-slate-400 text-xs">${s.metrics || '−'}</td>
    `;
    tbody.appendChild(tr);
  });
}

loadData().then(d => {
  renderGoal(d);
  renderDailyChart(d);
  renderFailChart(d);
  renderProcessTable(d.process_table || []);
}).catch(err => {
  console.error(err);
  document.getElementById('updated-at').textContent = 'データ読み込みエラー';
});
</script>
</body>
</html>
